<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinguaBloom · Free Book Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;700&family=Noto+Serif+JP:wght@200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    /* ══════════════════════════════════════════
       THEME TOKENS (classic vintage meets modern)
    ══════════════════════════════════════════ */
    :root {
      --ink:          #1a1a2e;
      --ink-soft:     #2d2d44;
      --ink-muted:    #5c5c7a;
      --paper:        #faf8f5;
      --paper-warm:   #f5f0e8;
      --paper-card:   rgba(255,255,255,0.82);
      --paper-header: rgba(250,248,245,0.92);
      --sakura:       #e8a0b4;
      --sakura-pale:  #f7e8ef;
      --sakura-deep:  #c4687e;
      --gold:         #c8a96e;
      --gold-pale:    #f5edda;
      --mist:         #8a8fa8;
      --accent-blue:  #7b9bbf;
      --green:        #5e8a6a;
      --border:       rgba(26,26,46,0.09);
      --border-h:     rgba(26,26,46,0.18);
      --shadow:       rgba(26,26,46,0.07);
      --shadow-deep:  rgba(26,26,46,0.16);
      --chat-bg:      rgba(250,248,245,0.98);
      --chat-input:   #f5f0e8;
      --chat-user-bg: #c4687e;
      --chat-bot-bg:  rgba(255,255,255,0.9);
      --chat-border:  rgba(26,26,46,0.08);
      --toggle-track: rgba(26,26,46,0.12);
      --toggle-thumb: #c4687e;
      --t: 0.4s cubic-bezier(.4,0,.2,1);
    }

    [data-theme="dark"] {
      --ink:          #e4dfd7;
      --ink-soft:     #c0bab4;
      --ink-muted:    #7a7590;
      --paper:        #0e0d18;
      --paper-warm:   #14121e;
      --paper-card:   rgba(22,20,38,0.82);
      --paper-header: rgba(10,9,18,0.94);
      --sakura:       #9a4060;
      --sakura-pale:  rgba(220,130,160,0.12);
      --sakura-deep:  #e888a4;
      --gold:         #c8a050;
      --gold-pale:    rgba(200,160,80,0.12);
      --mist:         #58546e;
      --accent-blue:  #6a8ab0;
      --green:        #6aaa7a;
      --border:       rgba(255,255,255,0.07);
      --border-h:     rgba(232,136,164,0.20);
      --shadow:       rgba(0,0,0,0.35);
      --shadow-deep:  rgba(0,0,0,0.6);
      --chat-bg:      rgba(16,14,28,0.98);
      --chat-input:   rgba(255,255,255,0.06);
      --chat-user-bg: #9e3a68;
      --chat-bot-bg:  rgba(30,26,50,0.95);
      --chat-border:  rgba(255,255,255,0.07);
      --toggle-track: rgba(232,136,164,0.25);
      --toggle-thumb: #e888a4;
    }

    /* ══════════════════════════════════════════
       BASE
    ══════════════════════════════════════════ */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      display: flex; flex-direction: column;
      overflow-x: hidden;
      transition: background var(--t), color var(--t);
    }

    /* ══════════════════════════════════════════
       BACKGROUND (classic ink wash + floating petals)
    ══════════════════════════════════════════ */
    .bg-canvas {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .ink-circle {
      position: absolute; border-radius: 50%; opacity: 0.055;
      animation: inkPulse 8s ease-in-out infinite;
      transition: background var(--t);
    }
    .ink-circle:nth-child(1){width:700px;height:700px;top:-200px;right:-200px;background:var(--sakura-deep);animation-delay:0s}
    .ink-circle:nth-child(2){width:500px;height:500px;bottom:-150px;left:-100px;background:var(--accent-blue);animation-delay:-3s}
    .ink-circle:nth-child(3){width:300px;height:300px;top:40%;left:30%;background:var(--gold);animation-delay:-5s}
    [data-theme="dark"] .ink-circle { opacity: 0.13; }
    @keyframes inkPulse{0%,100%{transform:scale(1);opacity:0.045}50%{transform:scale(1.08);opacity:0.09}}

    .ink-line{position:absolute;height:1px;background:linear-gradient(90deg,transparent,var(--ink) 30%,var(--ink) 70%,transparent);opacity:0.06;animation:inkStroke 12s ease-in-out infinite}
    @keyframes inkStroke{0%,100%{transform:scaleX(0.4)}50%{transform:scaleX(1)}}

    .petal{position:absolute;opacity:0;animation:petalFall linear infinite;pointer-events:none}
    @keyframes petalFall{0%{transform:translateY(-40px) rotate(0) translateX(0);opacity:0}10%{opacity:.55}90%{opacity:.28}100%{transform:translateY(105vh) rotate(360deg) translateX(60px);opacity:0}}

    /* Dark mode subtle aurora */
    [data-theme="dark"] .bg-canvas::before{
      content:'';position:absolute;inset:0;
      background:
        radial-gradient(ellipse 80% 50% at 15% 10%, rgba(180,60,130,0.18) 0%,transparent 65%),
        radial-gradient(ellipse 60% 50% at 85% 85%, rgba(70,110,190,0.14) 0%,transparent 60%);
      animation:auroraDrift 14s ease-in-out infinite alternate;
      filter:blur(50px);pointer-events:none;
    }
    @keyframes auroraDrift{0%{transform:scale(1)}100%{transform:scale(1.06) translateX(15px)}}

    /* ══════════════════════════════════════════
       HEADER (classic zen with glass)
    ══════════════════════════════════════════ */
    header{
      position:sticky;top:0;z-index:100;
      display:flex;align-items:center;justify-content:space-between;
      padding:1.1rem 5%;
      background:var(--paper-header);
      backdrop-filter:blur(18px) saturate(1.4);
      -webkit-backdrop-filter:blur(18px) saturate(1.4);
      border-bottom:1px solid var(--border);
      transition:background var(--t),border-color var(--t);
    }
    [data-theme="dark"] header::after{
      content:'';position:absolute;bottom:-1px;left:10%;right:10%;height:1px;
      background:linear-gradient(90deg,transparent,rgba(232,136,164,0.35),transparent);
    }
    .logo-area{
  display:flex;
  align-items:center;
  gap:0.8rem;
  text-decoration:none;
}

/* Logo circle */
.logo-mark{
  position:relative;
  width:40px;
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.logo-mark svg{
  width:40px;
  height:40px;
}

/* ✨ Smooth, subtle ring draw */
.brush-ring{
  stroke-dasharray:120;
  stroke-dashoffset:120;
  animation:drawRing 0s ease-out forwards; /* slower + smooth */
  stroke:var(--sakura-deep);
  fill:none;
  transition:stroke 0.s;
}

@keyframes drawRing{
  to{stroke-dashoffset:0;}
}

/* ✨ Softer text appearance (no zoom jump) */
.logo-char{
  fill:var(--ink);
  opacity:0;
  animation:fadeChar  forwards;
}

@keyframes fadeChar{
  from{opacity:0; transform:translateY(4px);} /* subtle move instead of scale */
  to{opacity:1; transform:translateY(0);}
}

/* Text */
.logo-text{
  display:flex;
  flex-direction:column;
  line-height:1;
}

.logo-main{
  font-family:'Noto Serif JP',serif;
  font-weight:300;
  font-size:1.4rem;
  color:var(--ink);
  letter-spacing:0.02em;
  transition:color 0.3s ease;
}

.logo-sub{
  font-size:0.63rem;
  font-weight:300;
  color:var(--mist);
  letter-spacing:0.25em;
  text-transform:uppercase;
  margin-top:2px;
  transition:color 0.3s ease;
}                                                              

    /* ── Menu (classic toggle + dropdown) ── */
    .menu-container{position:relative}
    .menu-button{background:transparent;border:1px solid var(--border);color:var(--ink-soft);padding:.55rem 1.3rem;border-radius:2px;font-family:'Zen Kaku Gothic New',sans-serif;font-size:.75rem;font-weight:400;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:.6rem;transition:all var(--t);position:relative;overflow:hidden}
    .menu-button::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--sakura-deep);transform:scaleX(0);transform-origin:left;transition:transform .4s cubic-bezier(.4,0,.2,1)}
    .menu-button:hover::after,.menu-container.active .menu-button::after{transform:scaleX(1)}
    .menu-button:hover{border-color:var(--sakura-deep);color:var(--ink)}
    .menu-button .chevron{font-size:.7rem;transition:transform .4s}
    .menu-container.active .menu-button .chevron{transform:rotate(180deg)}
    .dropdown-menu{position:absolute;top:calc(100% + 10px);right:0;background:var(--paper-header);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:2px;min-width:210px;padding:.5rem 0;z-index:200;opacity:0;visibility:hidden;transform:translateY(-8px);transition:all var(--t);box-shadow:0 24px 48px var(--shadow)}
    [data-theme="dark"] .dropdown-menu{border-color:rgba(232,136,164,0.12);box-shadow:0 32px 80px rgba(0,0,0,.65),inset 0 1px 0 rgba(232,136,164,0.07)}
    .menu-container.active .dropdown-menu{opacity:1;visibility:visible;transform:translateY(0)}
    .dropdown-menu a{display:flex;align-items:center;gap:.8rem;padding:.72rem 1.4rem;color:var(--ink-soft);text-decoration:none;font-size:.82rem;letter-spacing:.06em;transition:all .2s;position:relative}
    .dropdown-menu a::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:2px;background:var(--sakura-deep);transform:scaleY(0);transition:transform .25s}
    .dropdown-menu a:hover{color:var(--ink);background:var(--sakura-pale)}
    .dropdown-menu a:hover::before{transform:scaleY(1)}
    .dropdown-menu a i{width:16px;color:var(--sakura-deep);font-size:.75rem}
    .dropdown-menu hr{margin:.4rem 1rem;border:none;border-top:1px solid var(--border)}
    .dropdown-item-toggle{display:flex;align-items:center;justify-content:space-between;padding:.72rem 1.4rem;cursor:pointer;transition:background .2s}
    .dropdown-item-toggle:hover{background:var(--sakura-pale)}
    .toggle-label{display:flex;align-items:center;gap:.8rem;font-size:.82rem;letter-spacing:.06em;color:var(--ink-soft)}
    .toggle-label i{width:16px;color:var(--sakura-deep);font-size:.8rem}
    .switch{position:relative;width:36px;height:20px;flex-shrink:0}
    .switch input{opacity:0;width:0;height:0}
    .switch-track{position:absolute;inset:0;background:var(--toggle-track);border-radius:20px;cursor:pointer;transition:background .4s}
    .switch-track::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:var(--toggle-thumb);transition:transform .35s cubic-bezier(.4,0,.2,1),background .4s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
    .switch input:checked+.switch-track::after{transform:translateX(16px)}
    [data-theme="dark"] .switch-track{background:rgba(232,136,164,.3)}

    /* ══════════════════════════════════════════
       PAGE NAVIGATION TABS (classic underlines)
    ══════════════════════════════════════════ */
    .page-tabs{
      position:relative;z-index:5;
      display:flex;gap:0;
      padding:0 5%;
      border-bottom:1px solid var(--border);
      background:var(--paper-header);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      transition:background var(--t),border-color var(--t);
    }
    .page-tab{
      padding:.75rem 1.4rem;
      font-size:.75rem;letter-spacing:.15em;text-transform:uppercase;
      color:var(--mist);cursor:pointer;
      border:none;background:transparent;
      font-family:'Zen Kaku Gothic New',sans-serif;
      position:relative;transition:color var(--t);
    }
    .page-tab::after{
      content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
      background:var(--sakura-deep);transform:scaleX(0);transform-origin:left;
      transition:transform .35s cubic-bezier(.4,0,.2,1);
    }
    .page-tab.active{color:var(--sakura-deep)}
    .page-tab.active::after{transform:scaleX(1)}
    .page-tab:hover{color:var(--ink-soft)}

    /* ══════════════════════════════════════════
       MAIN LAYOUT
    ══════════════════════════════════════════ */
    main{position:relative;z-index:1;flex:1;padding:2.5rem 5% 5rem}

    /* ── Section heading (kanji + title) ── */
    .section-head{
      display:flex;align-items:baseline;gap:1rem;
      margin-bottom:2rem;
    }
    .section-kanji{
      font-family:'Noto Serif JP',serif;font-weight:200;font-size:3.5rem;
      color:rgba(26,26,46,.07);line-height:1;letter-spacing:-.02em;user-select:none;
      transition:color var(--t);
    }
    [data-theme="dark"] .section-kanji{color:rgba(228,220,215,.05)}
    .section-title-wrap{display:flex;flex-direction:column}
    .section-title{font-family:'Noto Serif JP',serif;font-size:1.6rem;font-weight:200;color:var(--ink);letter-spacing:.02em;line-height:1.3;transition:color var(--t)}
    .section-title strong{font-weight:400;color:var(--sakura-deep)}
    [data-theme="dark"] .section-title strong{text-shadow:0 0 24px rgba(232,136,164,.35)}
    .section-label{font-size:.63rem;letter-spacing:.3em;text-transform:uppercase;color:var(--mist);margin-top:4px;transition:color var(--t)}

    /* ── Filter bar (classic tags) ── */
    .filter-bar{
      display:flex;align-items:center;flex-wrap:wrap;gap:.6rem;
      margin-bottom:2rem;
    }
    .filter-label{
      font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;
      color:var(--mist);margin-right:.4rem;
    }
    .filter-btn{
      padding:.32rem .9rem;
      border:1px solid var(--border);border-radius:20px;
      background:transparent;color:var(--ink-muted);
      font-family:'Zen Kaku Gothic New',sans-serif;
      font-size:.72rem;letter-spacing:.08em;
      cursor:pointer;transition:all .2s;
    }
    .filter-btn:hover{border-color:var(--sakura-deep);color:var(--sakura-deep)}
    .filter-btn.active{
      background:var(--sakura-deep);
      border-color:var(--sakura-deep);
      color:#fff;
    }
    .filter-sep{width:1px;height:18px;background:var(--border);margin:0 .3rem}
    .sort-select{
      margin-left:auto;
      padding:.32rem .8rem;
      border:1px solid var(--border);border-radius:2px;
      background:var(--paper-card);color:var(--ink-soft);
      font-family:'Zen Kaku Gothic New',sans-serif;
      font-size:.72rem;cursor:pointer;outline:none;
      transition:all var(--t);
    }

    /* ── Book grid (responsive) ── */
    .book-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(200px,1fr));
      gap:1.8rem;
    }

    /* ══════════════════════════════════════════
       BOOK CARD – 3D classic library style
    ══════════════════════════════════════════ */
    .book-card{
      display:flex;flex-direction:column;
      cursor:pointer;
      animation:cardReveal .5s cubic-bezier(.4,0,.2,1) both;
    }
    @keyframes cardReveal{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

    .book-cover-wrap{
      position:relative;
      perspective:700px;
      margin-bottom:1rem;
    }

    .book-3d{
      position:relative;
      width:100%;
      padding-bottom:140%; /* classic book proportion */
      transform-style:preserve-3d;
      transition:transform .5s cubic-bezier(.4,0,.2,1);
    }
    .book-card:hover .book-3d{
      transform:rotateY(-18deg) rotateX(4deg) scale(1.04);
    }

    /* Cover face */
    .book-face{
      position:absolute;inset:0;
      border-radius:3px 8px 8px 3px;
      overflow:hidden;
      box-shadow:
        4px 6px 0 rgba(0,0,0,.12),
        6px 10px 20px rgba(0,0,0,.18),
        inset -2px 0 8px rgba(0,0,0,.08);
      transition:box-shadow .5s;
    }
    .book-card:hover .book-face{
      box-shadow:
        8px 12px 0 rgba(0,0,0,.15),
        14px 22px 40px rgba(0,0,0,.28),
        inset -3px 0 10px rgba(0,0,0,.12);
    }
    [data-theme="dark"] .book-card:hover .book-face{
      box-shadow:
        8px 12px 0 rgba(0,0,0,.5),
        16px 26px 50px rgba(0,0,0,.55),
        0 0 30px rgba(232,136,164,.08),
        inset -3px 0 10px rgba(0,0,0,.25);
    }

    /* Spine illusion */
    .book-face::before{
      content:'';
      position:absolute;top:0;left:0;bottom:0;width:12px;
      background:linear-gradient(90deg,rgba(0,0,0,.22),rgba(0,0,0,.06));
      z-index:2;
    }
    /* Subtle sheen */
    .book-face::after{
      content:'';
      position:absolute;top:0;left:0;right:0;bottom:0;
      background:linear-gradient(135deg,rgba(255,255,255,.22) 0%,transparent 50%,rgba(0,0,0,.04) 100%);
      z-index:3;pointer-events:none;
      transition:opacity .5s;
    }
    .book-card:hover .book-face::after{opacity:.6}

    .book-face svg{width:100%;height:100%;display:block}

    /* Page edge effect */
    .book-pages{
      position:absolute;
      right:-4px;top:2px;bottom:2px;width:6px;
      background:repeating-linear-gradient(
        to bottom,
        #f5f0e8 0px,
        #e8e0d0 1px,
        #f5f0e8 2px
      );
      border-radius:0 2px 2px 0;
      box-shadow:2px 0 4px rgba(0,0,0,.1);
    }
    [data-theme="dark"] .book-pages{
      background:repeating-linear-gradient(
        to bottom,
        #2a2838 0px,
        #1e1c28 1px,
        #2a2838 2px
      );
    }

    /* Hover overlay with download/preview */
    .book-overlay{
      position:absolute;inset:0;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem;
      background:rgba(26,26,46,.55);
      backdrop-filter:blur(2px);
      opacity:0;transition:opacity .3s ease;
      border-radius:3px 8px 8px 3px;
      z-index:10;
    }
    [data-theme="dark"] .book-overlay{background:rgba(8,6,20,.65)}
    .book-card:hover .book-overlay{opacity:1}
    .overlay-btn{
      padding:.4rem 1.1rem;border-radius:20px;border:1px solid rgba(255,255,255,.5);
      background:rgba(255,255,255,.12);color:#fff;
      font-family:'Zen Kaku Gothic New',sans-serif;
      font-size:.72rem;letter-spacing:.1em;cursor:pointer;
      transition:background .2s;
    }
    .overlay-btn:hover{background:rgba(255,255,255,.22)}
    .overlay-btn.primary{
      background:var(--sakura-deep);border-color:var(--sakura-deep);
    }
    .overlay-btn.primary:hover{background:#a04060}

    /* Book meta info */
    .book-meta{padding:0 .1rem}
    .book-level{
      font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;
      color:var(--mist);margin-bottom:.3rem;
      display:flex;align-items:center;gap:.4rem;
    }
    .level-dot{
      width:6px;height:6px;border-radius:50%;flex-shrink:0;
    }
    .book-title{
      font-family:'Noto Serif JP',serif;
      font-weight:300;font-size:.95rem;
      color:var(--ink);line-height:1.3;
      margin-bottom:.3rem;
      transition:color var(--t);
    }
    .book-card:hover .book-title{color:var(--sakura-deep)}
    .book-author{font-size:.72rem;color:var(--mist);margin-bottom:.6rem;transition:color var(--t)}
    .book-footer{
      display:flex;align-items:center;justify-content:space-between;
    }
    .book-tag{
      font-size:.62rem;letter-spacing:.1em;padding:.2rem .6rem;
      border-radius:1px;border:1px solid;
    }
    .book-rating{
      display:flex;align-items:center;gap:.25rem;
      font-size:.68rem;color:var(--gold);
    }
    .book-rating i{font-size:.55rem}

    /* Level badges (color coded) */
    .lvl-a1 .level-dot{background:#7ab888}.lvl-a1 .book-tag{color:#3d7a50;border-color:rgba(94,138,106,.4);background:rgba(94,138,106,.08)}
    .lvl-a2 .level-dot{background:#8ab8a0}.lvl-a2 .book-tag{color:#3d7a50;border-color:rgba(94,138,106,.4);background:rgba(94,138,106,.08)}
    .lvl-b1 .level-dot{background:#7b9bbf}.lvl-b1 .book-tag{color:var(--accent-blue);border-color:rgba(123,155,191,.4);background:rgba(123,155,191,.08)}
    .lvl-b2 .level-dot{background:#5a7a9e}.lvl-b2 .book-tag{color:var(--accent-blue);border-color:rgba(90,122,158,.4);background:rgba(90,122,158,.08)}
    .lvl-c1 .level-dot{background:#c4687e}.lvl-c1 .book-tag{color:var(--sakura-deep);border-color:var(--sakura);background:var(--sakura-pale)}

    /* ══════════════════════════════════════════
       FEATURED BANNER (classic spotlight)
    ══════════════════════════════════════════ */
    .featured-banner{
      display:grid;
      grid-template-columns:1fr 2.4fr;
      gap:0;
      background:var(--paper-card);
      border:1px solid var(--border);
      border-radius:4px;
      overflow:hidden;
      margin-bottom:2.5rem;
      box-shadow:0 12px 40px var(--shadow);
      transition:background var(--t),border-color var(--t);
      animation:cardReveal .5s cubic-bezier(.4,0,.2,1) both;
    }
    [data-theme="dark"] .featured-banner{
      border-color:rgba(232,136,164,.1);
      box-shadow:0 16px 50px rgba(0,0,0,.5),inset 0 1px 0 rgba(232,136,164,.06);

    .chat-fab.open{transform:scale(.9) rotate(45deg)}

      content:'';position:absolute;inset:-4px;border-radius:50%;

      animation:fabPulse 2.5s ease-in-out infinite;

      background:linear-gradient(135deg,var(--sakura-deep) 0%,#a04060 100%);

/* ── Render books ── */
function renderBooks(filter='all') {
  const grid = document.getElementById('bookGrid');
  grid.innerHTML = '';
  const filtered = filter==='all' ? BOOKS : BOOKS.filter(b => b.level===filter || b.genre===filter);

  filtered.forEach((book, i) => {
    const card = document.createElement('div');
    card.className = `book-card lvl-${book.level}`;
    card.style.animationDelay = (i * 0.06) + 's';

    const stars = '★'.repeat(Math.floor(book.rating)) + (book.rating % 1 >= 0.5 ? '½' : '');

    card.innerHTML = `
      <div class="book-cover-wrap">
        <div class="book-3d">
          <div class="book-face">${book.cover}</div>
          <div class="book-pages"></div>
        </div>
        <div class="book-overlay">
  

  <a href="${book.download}" target="_blank" class="overlay-btn primary">
    Download
  </a>

  <a href="${book.preview}" target="_blank" class="overlay-btn">
    Preview
  </a>
</div>
      </div>
      <div class="book-meta">
        <div class="book-level">
          <span class="level-dot"></span>
          ${book.tag}
        </div>
        <div class="book-title">${book.title}</div>
        <div class="book-author">${book.author} · ${book.pages}p</div>
        <div class="book-footer">
          <span class="book-tag">${book.genre === 'fiction' ? 'Fiction' : 'Non-fiction'}</span>
          <div class="book-rating">
            <i class="fas fa-star"></i> ${book.rating}
          </div>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}
renderBooks();

/* ── Filters ── */
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderBooks(btn.dataset.filter);
  });
});

(function(){
  const canvas = document.querySelector('.bg-canvas');
  const lc = ['#e8a0b4','#f2b8c6','#d4a0b0','#ebbcca'];
  const dc = ['#8a3a58','#a05070','#7a304a'];
  function isDark(){return document.documentElement.dataset.theme==='dark'}
  function mk(){
    const el=document.createElement('div');el.className='petal';
    const sz=8+Math.random()*10,x=Math.random()*100,dur=10+Math.random()*12,delay=Math.random()*-20;
    const col=(isDark()?dc:lc)[Math.floor(Math.random()*(isDark()?dc:lc).length)];
    el.style.cssText=`left:${x}vw;top:-20px;animation-duration:${dur}s;animation-delay:${delay}s`;
    el.innerHTML=`<svg width="${sz}" height="${sz}" viewBox="0 0 20 20">
      <ellipse cx="10" cy="5" rx="3" ry="5" fill="${col}" opacity="0.65" transform="rotate(0,10,10)"/>
      <ellipse cx="10" cy="5" rx="3" ry="5" fill="${col}" opacity="0.65" transform="rotate(90,10,10)"/>
      <ellipse cx="10" cy="5" rx="3" ry="5" fill="${col}" opacity="0.65" transform="rotate(180,10,10)"/>
      <ellipse cx="10" cy="5" rx="3" ry="5" fill="${col}" opacity="0.65" transform="rotate(270,10,10)"/>
      <circle cx="10" cy="10" r="2" fill="#f7e0e8" opacity="0.85"/></svg>`;
    canvas.appendChild(el);
    setTimeout(()=>el.remove(),(dur+Math.abs(delay)+2)*1000);
  }
  for(let i=0;i<8;i++)mk();
  setInterval(mk,1800);
})();

/* ── Menu (classic dropdown) ── */
(function(){
  const cont=document.getElementById('menuContainer');
  const tog=document.getElementById('menuToggle');
  const dd=document.getElementById('dropdownMenu');
  tog.addEventListener('click',e=>{e.stopPropagation();const o=cont.classList.toggle('active');tog.setAttribute('aria-expanded',o)});
  document.addEventListener('click',e=>{if(!cont.contains(e.target)){cont.classList.remove('active');tog.setAttribute('aria-expanded','false')}});
  dd.addEventListener('click',e=>{if(e.target.tagName==='A'||e.target.closest('a')){cont.classList.remove('active');tog.setAttribute('aria-expanded','false')}});

})();

/* ── Theme switch (dark mode) ── */
(function(){
  const sw=document.getElementById('themeSwitch');
  const icon=document.getElementById('themeIcon');
  const lbl=document.getElementById('themeLabel');
  const row=document.getElementById('themeToggleRow');
  const html=document.documentElement;
  function apply(on,save){
    html.dataset.theme=on?'dark':'light';
    sw.checked=on;
    icon.className=on?'fas fa-sun':'fas fa-moon';
    lbl.textContent=on?'Light Mode':'Dark Mode';
    if(save)try{localStorage.setItem('lb-theme',on?'dark':'light')}catch(e){}
  }
  try{if(localStorage.getItem('lb-theme')==='dark')apply(true,false)}catch(e){}
  sw.addEventListener('change',()=>apply(sw.checked,true));
  row.addEventListener('click',()=>apply(!sw.checked,true));
  row.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();apply(!sw.checked,true)}});
})();
