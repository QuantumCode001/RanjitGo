<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinguaBloom · 3D Profile Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;700&family=Noto+Serif+JP:wght@200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    /* ══ THEME TOKENS ══ */
    :root {
      --ink:           #1a1a2e;
      --ink-soft:      #2d2d44;
      --ink-muted:     #5c5c7a;
      --paper:         #faf8f5;
      --paper-warm:    #f5f0e8;
      --paper-card:    rgba(255,255,255,0.82);
      --paper-header:  rgba(250,248,245,0.92);
      --sakura:        #e8a0b4;
      --sakura-pale:   #f7e8ef;
      --sakura-deep:   #c4687e;
      --gold:          #c8a96e;
      --gold-pale:     #f5edda;
      --mist:          #8a8fa8;
      --accent-blue:   #7b9bbf;
      --green:         #5e8a6a;
      --border:        rgba(26,26,46,0.10);
      --shadow:        rgba(26,26,46,0.10);
      --shadow-deep:   rgba(26,26,46,0.25);
      --toggle-track:  rgba(26,26,46,0.12);
      --toggle-thumb:  #c4687e;
    }
    [data-theme="dark"] {
      --ink:           #e4dfd7;
      --ink-soft:      #c0bab4;
      --ink-muted:     #7a7590;
      --paper:         #111018;
      --paper-warm:    #18161f;
      --paper-card:    rgba(28,26,40,0.92);
      --paper-header:  rgba(15,14,22,0.96);
      --sakura:        #a05070;
      --sakura-pale:   rgba(196,104,126,0.13);
      --sakura-deep:   #e888a4;
      --gold:          #c8a96e;
      --gold-pale:     rgba(200,169,110,0.12);
      --mist:          #56546a;
      --accent-blue:   #5a7a9e;
      --green:         #4a9e5e;
      --border:        rgba(255,255,255,0.07);
      --shadow:        rgba(0,0,0,0.38);
      --shadow-deep:   rgba(0,0,0,0.65);
      --toggle-track:  rgba(232,136,164,0.25);
      --toggle-thumb:  #e888a4;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      background:
        radial-gradient(circle at top right, rgba(196,104,126,0.10), transparent 28%),
        radial-gradient(circle at bottom left, rgba(123,155,191,0.10), transparent 24%),
        linear-gradient(180deg, var(--paper) 0%, var(--paper-warm) 100%);
      color: var(--ink);
      min-height: 100vh;
      display: flex; flex-direction: column;
      overflow-x: hidden;
      transition: background 0.5s, color 0.5s;
    }

    /* ══ BG ══ */
    .bg-canvas {
      position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden;
    }
    .ink-circle {
      position:absolute; border-radius:50%; opacity:0.05;
      animation:inkPulse 8s ease-in-out infinite; transition:background 0.5s;
    }
    .ink-circle:nth-child(1){width:700px;height:700px;top:-200px;right:-200px;background:var(--sakura-deep);}
    .ink-circle:nth-child(2){width:500px;height:500px;bottom:-150px;left:-100px;background:var(--accent-blue);animation-delay:-3s;}
    .ink-circle:nth-child(3){width:300px;height:300px;top:40%;left:30%;background:var(--gold);animation-delay:-5s;}
    @keyframes inkPulse{0%,100%{transform:scale(1);opacity:0.04}50%{transform:scale(1.08);opacity:0.09}}
    [data-theme="dark"] .ink-circle{opacity:0.13}

    .petal{position:absolute;opacity:0;animation:petalFall linear infinite;pointer-events:none;}
    @keyframes petalFall{
      0%{transform:translateY(-40px) rotate(0deg);opacity:0}
      10%{opacity:0.55} 90%{opacity:0.3}
      100%{transform:translateY(105vh) rotate(380deg) translateX(50px);opacity:0}
    }
    .ink-line{
      position:absolute; height:1px;
      background:linear-gradient(90deg,transparent,var(--ink) 30%,var(--ink) 70%,transparent);
      opacity:0.06; animation:inkStroke 12s ease-in-out infinite;
    }
    @keyframes inkStroke{0%,100%{transform:scaleX(0.4);opacity:0.03}50%{transform:scaleX(1);opacity:0.07}}

    /* ══ HEADER ══ */
    header {
      position:sticky; top:0; z-index:100;
      display:flex; align-items:center; justify-content:space-between;
      padding:1.1rem 5%;
      background:var(--paper-header);
      backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
      transition:background 0.5s, border-color 0.5s;
    }

    .logo-area{
  display:flex;
  align-items:center;
  gap:0.8rem;
  text-decoration:none;
}

/* Logo circle */
.logo-mark{
  position:relative;
  width:40px;
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.logo-mark svg{
  width:40px;
  height:40px;
}

/* ✨ Smooth, subtle ring draw */
.brush-ring{
  stroke-dasharray:120;
  stroke-dashoffset:120;
  animation:drawRing 0s ease-out forwards; /* slower + smooth */
  stroke:var(--sakura-deep);
  fill:none;
  transition:stroke 0.s;
}

@keyframes drawRing{
  to{stroke-dashoffset:0;}
}

/* ✨ Softer text appearance (no zoom jump) */
.logo-char{
  fill:var(--ink);
  opacity:0;
  animation:fadeChar  forwards;
}

@keyframes fadeChar{
  from{opacity:0; transform:translateY(4px);} /* subtle move instead of scale */
  to{opacity:1; transform:translateY(0);}
}

/* Text */
.logo-text{
  display:flex;
  flex-direction:column;
  line-height:1;
}

.logo-main{
  font-family:'Noto Serif JP',serif;
  font-weight:300;
  font-size:1.4rem;
  color:var(--ink);
  letter-spacing:0.02em;
  transition:color 0.3s ease;
}

.logo-sub{
  font-size:0.63rem;
  font-weight:300;
  color:var(--mist);
  letter-spacing:0.25em;
  text-transform:uppercase;
  margin-top:2px;
  transition:color 0.3s ease;
}
    .menu-container{position:relative;}
    .menu-button{background:transparent;border:1px solid var(--border);color:var(--ink-soft);padding:0.55rem 1.3rem;border-radius:2px;font-family:'Zen Kaku Gothic New',sans-serif;font-size:0.75rem;font-weight:400;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:0.6rem;transition:all 0.3s;position:relative;overflow:hidden;}
    .menu-button::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--sakura-deep);transform:scaleX(0);transform-origin:left;transition:transform 0.4s cubic-bezier(.4,0,.2,1);}
    .menu-button:hover::after,.menu-container.active .menu-button::after{transform:scaleX(1);}
    .menu-button:hover{border-color:var(--sakura-deep);color:var(--ink);}
    .menu-button .chevron{font-size:0.7rem;transition:transform 0.4s;}
    .menu-container.active .menu-button .chevron{transform:rotate(180deg);}
    .dropdown-menu{position:absolute;top:calc(100% + 10px);right:0;background:var(--paper-header);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:2px;min-width:210px;padding:0.5rem 0;z-index:200;opacity:0;visibility:hidden;transform:translateY(-8px);transition:all 0.3s cubic-bezier(.4,0,.2,1);box-shadow:0 24px 48px var(--shadow);}
    .menu-container.active .dropdown-menu{opacity:1;visibility:visible;transform:translateY(0);}
    .dropdown-menu a{display:flex;align-items:center;gap:0.8rem;padding:0.72rem 1.4rem;color:var(--ink-soft);text-decoration:none;font-size:0.82rem;letter-spacing:0.06em;transition:all 0.2s;position:relative;}
    .dropdown-menu a::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:2px;background:var(--sakura-deep);transform:scaleY(0);transition:transform 0.25s;}
    .dropdown-menu a:hover{color:var(--ink);background:var(--sakura-pale);}
    .dropdown-menu a:hover::before{transform:scaleY(1);}
    .dropdown-menu a i{width:16px;color:var(--sakura-deep);font-size:0.75rem;}
    .dropdown-menu hr{margin:0.4rem 1rem;border:none;border-top:1px solid var(--border);}
    .dropdown-item-toggle{display:flex;align-items:center;justify-content:space-between;padding:0.72rem 1.4rem;cursor:pointer;transition:background 0.2s;}
    .dropdown-item-toggle:hover{background:var(--sakura-pale);}
    .toggle-label{display:flex;align-items:center;gap:0.8rem;font-size:0.82rem;letter-spacing:0.06em;color:var(--ink-soft);}
    .toggle-label i{width:16px;color:var(--sakura-deep);font-size:0.8rem;}
    .switch{position:relative;width:36px;height:20px;flex-shrink:0;}
    .switch input{opacity:0;width:0;height:0;}
    .switch-track{position:absolute;inset:0;background:var(--toggle-track);border-radius:20px;cursor:pointer;transition:background 0.4s;}
    .switch-track::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:var(--toggle-thumb);transition:transform 0.35s cubic-bezier(.4,0,.2,1),background 0.4s;box-shadow:0 1px 4px rgba(0,0,0,0.2);}
    .switch input:checked + .switch-track::after{transform:translateX(16px);}
    [data-theme="dark"] .switch-track{background:rgba(232,136,164,0.3);}

    /* ══ MAIN ══ */
    main {
      position:relative; z-index:1; flex:1;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:3rem 5% 5rem;
      gap:3rem;
    }

    /* ══ SECTION HEAD ══ */
    .section-head{
      width:100%; max-width:1100px;
      display:flex; align-items:baseline; gap:1rem;
    }
    .section-kanji{font-family:'Noto Serif JP',serif;font-weight:200;font-size:3.5rem;color:rgba(26,26,46,0.07);line-height:1;letter-spacing:-0.02em;user-select:none;transition:color 0.5s;}
    [data-theme="dark"] .section-kanji{color:rgba(228,223,215,0.06);}
    .section-title-wrap{display:flex;flex-direction:column;}
    .section-title{font-family:'Noto Serif JP',serif;font-size:1.6rem;font-weight:200;color:var(--ink);letter-spacing:0.02em;line-height:1.3;transition:color 0.5s;}
    .section-title strong{font-weight:400;color:var(--sakura-deep);}
    .section-label{font-size:0.63rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--mist);margin-top:4px;transition:color 0.5s;}

    /* ══ CARDS ROW ══ */
    .cards-row {
      width:100%; max-width:1100px;
      display:flex; gap:2rem; justify-content:center;
      flex-wrap: wrap;
    }

    /* ══ 3D CARD SCENE ══ */
    .scene {
      width: 260px;
      flex-shrink: 0;
    }

    /* ══ CARD WRAPPER ══ */
    .card-wrap {
      width: 260px;
      height: 380px;
      position: relative;
      border-radius: 16px;
      cursor: pointer;
      transition: transform 0.28s cubic-bezier(.4,0,.2,1), box-shadow 0.28s cubic-bezier(.4,0,.2,1);
    }
    .card-wrap:active {
      transform: scale(0.985);
    }
    .card-wrap.is-active {
      transform: translateY(-10px);
    }

    /* ══ CARD SHELL ══ */
    .card-shell {
      position: absolute; inset: 0;
      border-radius: 16px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.26), transparent 22%),
        var(--paper-card);
      border: 1px solid var(--border);
      box-shadow:
        0 8px 32px var(--shadow-deep),
        0 2px 8px var(--shadow);
      transition: background 0.5s, border-color 0.5s, box-shadow 0.28s cubic-bezier(.4,0,.2,1);
    }
    .card-wrap.is-active .card-shell{
      box-shadow:
        0 18px 42px var(--shadow-deep),
        0 6px 18px var(--shadow);
    }
    .card-shell::before{
      content:'';
      position:absolute; inset:0;
      background:linear-gradient(135deg, rgba(255,255,255,0.14), transparent 38%);
      pointer-events:none;
      z-index:1;
    }

    /* Accent top bar */
    .card-top-bar {
      position:absolute; top:0; left:0; right:0; height:3px; z-index:5;
      border-radius: 16px 16px 0 0;
    }

    /* ══ IMAGE LAYER — the main 3D floating image ══ */
    .card-img-layer {
      position: absolute;
      inset: 0;
      border-radius: 16px;
      overflow: visible;
      display: flex; align-items: flex-end; justify-content: center;
    }

    .card-img-layer img {
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 88%;
      height: 90%;
      object-fit: cover;
      object-position: top center;
      border-radius: 12px;
      display: block;
      transition: transform 0.32s cubic-bezier(.4,0,.2,1), filter 0.32s cubic-bezier(.4,0,.2,1);
      filter: drop-shadow(0 16px 32px rgba(0,0,0,0.35));
      pointer-events: none;
      transform-origin: center bottom;
    }
    .card-wrap.is-active .card-img-layer img{
      transform: translateX(-50%) translateY(-14px) scale(1.03);
      filter: drop-shadow(0 24px 36px rgba(0,0,0,0.42));
    }

    /* When 3D mode active — image pops forward */
    /* Bottom gradient */
    .card-gradient {
      position:absolute; inset:0; border-radius:16px;
      pointer-events:none; z-index:2;
    }

    /* ══ INFO PANEL (slides up on activate) ══ */
    .card-info-panel {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 1.4rem 1.2rem 1rem;
      z-index: 6;
      transition: transform 0.3s cubic-bezier(.4,0,.2,1);
    }
    .card-wrap.is-active .card-info-panel{
      transform: translateY(-6px);
    }

    .card-number {
      font-family:'Noto Serif JP',serif; font-weight:200;
      font-size:0.6rem; letter-spacing:0.25em; text-transform:uppercase;
      margin-bottom:0.3rem;
    }
    .card-name {
      font-family:'Noto Serif JP',serif; font-weight:300;
      font-size:1.25rem; line-height:1.2; margin-bottom:0.15rem;
      letter-spacing:0.02em;
    }
    .card-role {
      font-size:0.68rem; letter-spacing:0.12em; text-transform:uppercase;
      margin-bottom:0.8rem; opacity:0.75;
    }
    .card-divider {
      height:1px; background:rgba(255,255,255,0.18);
      margin-bottom:0.8rem;
    }
    .card-stats {
      display:flex; gap:0; margin-bottom:0.8rem;
    }
    .c-stat {
      flex:1; text-align:center;
      border-right: 1px solid rgba(255,255,255,0.15);
    }
    .c-stat:last-child { border-right:none; }
    .c-stat-num {
      font-family:'Noto Serif JP',serif; font-weight:300;
      font-size:1.1rem; line-height:1; color:white;
    }
    .c-stat-label {
      font-size:0.55rem; letter-spacing:0.14em; text-transform:uppercase;
      color:rgba(255,255,255,0.6); margin-top:2px;
    }

    /* Tags row */
    .card-tags {
      display:flex; flex-wrap:wrap; gap:0.3rem;
    }
    .c-tag {
      font-size:0.6rem; letter-spacing:0.1em; text-transform:uppercase;
      padding:0.18rem 0.5rem; border-radius:1px;
      background:rgba(255,255,255,0.12);
      border:1px solid rgba(255,255,255,0.2);
      color:rgba(255,255,255,0.85);
    }

    /* Click hint */
    .card-hint {
      position:absolute; top:0.7rem; right:0.7rem; z-index:7;
      font-size:0.6rem; letter-spacing:0.12em; text-transform:uppercase;
      padding:0.2rem 0.55rem; border-radius:20px;
      background:rgba(17,16,24,0.28);
      border:1px solid rgba(255,255,255,0.16);
      color:rgba(255,255,255,0.88);
      display:flex; align-items:center; gap:0.35rem;
      transition:opacity 0.25s ease, transform 0.25s ease;
      backdrop-filter:blur(4px);
    }
    .card-hint i { font-size:0.55rem; }
    .card-wrap.is-active .card-hint{
      opacity:0;
      transform: translateY(-4px);
    }

    /* ══ SHIMMER LAYER ══ */

    /* ══ PARTICLE SPARKS (on activate) ══ */
    .spark {
      position:absolute; border-radius:50%;
      pointer-events:none; z-index:20;
      animation:sparkFly 0.7s cubic-bezier(.4,0,.2,1) forwards;
    }
    @keyframes sparkFly {
      0%   { transform:translate(0,0) scale(1); opacity:1; }
      100% { transform:translate(var(--tx),var(--ty)) scale(0); opacity:0; }
    }

    /* ══ FLOATING 3D LABEL BADGE ══ */
    .float-badge {
      position:absolute; z-index:9;
      padding:0.3rem 0.8rem;
      border-radius:2px;
      font-size:0.65rem; letter-spacing:0.15em; text-transform:uppercase;
      backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,0.22);
      background:rgba(17,16,24,0.24);
      color:white;
      font-family:'Zen Kaku Gothic New',sans-serif;
      opacity:0;
      transition: opacity 0.26s ease, transform 0.3s cubic-bezier(.4,0,.2,1);
      pointer-events:none;
    }
    .float-badge:empty{display:none;}
    .float-badge.top-left  { top:3rem; left:0.8rem; transform:translate(-10px, 10px); }
    .float-badge.top-right { top:3rem; right:0.8rem; transform:translate(10px, 10px); }
    .card-wrap.is-active .float-badge{
      opacity:1;
    }
    .card-wrap.is-active .float-badge.top-left{
      transform:translate(0,0);
    }
    .card-wrap.is-active .float-badge.top-right{
      transform:translate(0,0);
    }

    /* ✨ SIMPLE CARD HOVER ANIMATION */
.card-wrap {
  transition: 
    transform 0.3s ease,
    box-shadow 0.3s ease;
}

.card-wrap:hover {
  transform: translateY(-12px) scale(1.02);
}

/* Smooth image zoom */
.card-wrap:hover .card-img-layer img {
  transform: translateX(-50%) scale(1.05);
}

/* Glow effect on hover */
.card-wrap:hover .card-shell {
  box-shadow:
    0 20px 50px var(--shadow-deep),
    0 10px 25px var(--shadow);
}

    /* ══ GLOW RING ══ */
    .card-glow-ring {
      position:absolute; inset:-3px; border-radius:18px;
      opacity:0.72; z-index:-1;
      transition:opacity 0.4s;
      pointer-events:none;
    }
    .card-wrap.is-active .card-glow-ring{
      opacity:1;
    }

    .card-stats,
    .card-tags{
      transition: transform 0.28s cubic-bezier(.4,0,.2,1), opacity 0.28s ease;
    }
    .card-tags{
      opacity:0.88;
      transform:translateY(6px);
    }
    .card-wrap.is-active .card-stats{
      transform:translateY(-2px);
    }
    .card-wrap.is-active .card-tags{
      opacity:1;
      transform:translateY(0);
    }

    /* ══ CARD COLOURS ══ */
    /* Card 1 — Sakura */
    .card-s1 .card-top-bar   { background:linear-gradient(90deg,#c4687e,#e8a0b4); }
    .card-s1 .card-gradient  { background:linear-gradient(0deg, rgba(196,104,126,0.92) 0%, rgba(160,64,96,0.7) 45%, transparent 78%); }
    .card-s1 .card-number    { color:rgba(255,255,255,0.65); }
    .card-s1 .card-name      { color:white; }
    .card-s1 .card-role      { color:rgba(255,255,255,0.75); }
    .card-s1 .card-glow-ring { box-shadow:0 0 0 1px rgba(196,104,126,0.5), 0 0 40px 10px rgba(196,104,126,0.3); }

    /* Card 2 — Blue */
    .card-s2 .card-top-bar   { background:linear-gradient(90deg,#7b9bbf,#b0cce8); }
    .card-s2 .card-gradient  { background:linear-gradient(0deg, rgba(60,90,140,0.92) 0%, rgba(90,122,180,0.7) 45%, transparent 78%); }
    .card-s2 .card-number    { color:rgba(255,255,255,0.65); }
    .card-s2 .card-name      { color:white; }
    .card-s2 .card-role      { color:rgba(255,255,255,0.75); }
    .card-s2 .card-glow-ring { box-shadow:0 0 0 1px rgba(123,155,191,0.5), 0 0 40px 10px rgba(123,155,191,0.3); }

    /* Card 3 — Gold */
    .card-s3 .card-top-bar   { background:linear-gradient(90deg,#c8a96e,#e8d0a0); }
    .card-s3 .card-gradient  { background:linear-gradient(0deg, rgba(140,100,40,0.92) 0%, rgba(180,140,60,0.7) 45%, transparent 78%); }
    .card-s3 .card-number    { color:rgba(255,255,255,0.65); }
    .card-s3 .card-name      { color:white; }
    .card-s3 .card-role      { color:rgba(255,255,255,0.75); }
    .card-s3 .card-glow-ring { box-shadow:0 0 0 1px rgba(200,169,110,0.5), 0 0 40px 10px rgba(200,169,110,0.3); }

    /* Card 4 — Green */
    .card-s4 .card-top-bar   { background:linear-gradient(90deg,#5e8a6a,#a0c8a8); }
    .card-s4 .card-gradient  { background:linear-gradient(0deg, rgba(40,90,55,0.92) 0%, rgba(70,130,85,0.7) 45%, transparent 78%); }
    .card-s4 .card-number    { color:rgba(255,255,255,0.65); }
    .card-s4 .card-name      { color:white; }
    .card-s4 .card-role      { color:rgba(255,255,255,0.75); }

  function spawnSparks(target, color) {
    const rect = target.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top  + rect.height/2;
    for(let i=0;i<16;i++){
      const spark = document.createElement('div');
      spark.className = 'spark';
      const size = 4 + Math.random()*6;
      const angle = (i/16)*Math.PI*2;
      const dist  = 60 + Math.random()*80;
      spark.style.cssText = `
        width:${size}px;height:${size}px;
        background:${color};
        left:${cx - size/2 + window.scrollX}px;
        top:${cy  - size/2 + window.scrollY}px;
        --tx:${Math.cos(angle)*dist}px;
        --ty:${Math.sin(angle)*dist}px;
        animation-duration:${0.5+Math.random()*0.4}s;
        animation-delay:${Math.random()*0.12}s;
      `;
      document.body.appendChild(spark);
      spark.addEventListener('animationend',()=>spark.remove());
