<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RanjitGo · Daily Tasks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;700&family=Noto+Serif+JP:wght@200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --ink:          #1a1a2e;
      --ink-soft:     #2d2d44;
      --ink-muted:    #5c5c7a;
      --paper:        #faf8f5;
      --paper-warm:   #f5f0e8;
      --paper-card:   rgba(255,255,255,0.75);
      --paper-header: rgba(250,248,245,0.88);
      --sakura:       #e8a0b4;
      --sakura-pale:  #f7e8ef;
      --sakura-deep:  #c4687e;
      --gold:         #c8a96e;
      --gold-pale:    #f5edda;
      --mist:         #8a8fa8;
      --accent-blue:  #7b9bbf;
      --border:       rgba(26,26,46,0.10);
      --shadow:       rgba(26,26,46,0.08);
      --paper-header: rgba(250,248,245,0.88);
      --toggle-track: rgba(26,26,46,0.12);
      --toggle-thumb: #c4687e;
      --success:      #5a9e7a;
      --success-pale: #e8f5ee;
      --error:        #c46860;
      --error-pale:   #f5e8e8;
    }

    [data-theme="dark"] {
      --ink:          #e4dfd7;
      --ink-soft:     #c0bab4;
      --ink-muted:    #7a7590;
      --paper:        #111018;
      --paper-warm:   #18161f;
      --paper-card:   rgba(28,26,40,0.82);
      --paper-header: rgba(15,14,22,0.92);
      --sakura:       #a05070;
      --sakura-pale:  rgba(196,104,126,0.15);
      --sakura-deep:  #e888a4;
      --gold:         #8a6c38;
      --gold-pale:    rgba(200,169,110,0.12);
      --mist:         #56546a;
      --accent-blue:  #5a7a9e;
      --border:       rgba(255,255,255,0.07);
      --shadow:       rgba(0,0,0,0.35);
      --toggle-track: rgba(232,136,164,0.25);
      --toggle-thumb: #e888a4;
      --success:      #4a8e6a;
      --success-pale: rgba(90,158,122,0.15);
      --error:        #b45860;
      --error-pale:   rgba(196,104,96,0.15);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      transition: background 0.5s ease, color 0.5s ease;
    }

    /* ── Background ── */
    .bg-canvas {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .ink-circle {
      position: absolute; border-radius: 50%;
      opacity: 0.06;
      animation: inkPulse 8s ease-in-out infinite;
      transition: background 0.5s ease;
    }
    .ink-circle:nth-child(1) { width:700px; height:700px; top:-200px; right:-200px; background:var(--sakura-deep); animation-delay:0s; }
    .ink-circle:nth-child(2) { width:500px; height:500px; bottom:-150px; left:-100px; background:var(--accent-blue); animation-delay:-3s; }
    .ink-circle:nth-child(3) { width:300px; height:300px; top:40%; left:30%; background:var(--gold); animation-delay:-5s; }
    @keyframes inkPulse {
      0%,100% { transform:scale(1); opacity:0.05; }
      50%      { transform:scale(1.08); opacity:0.09; }
    }
    [data-theme="dark"] .ink-circle { opacity: 0.12; }

    .petal { position:absolute; opacity:0; animation:petalFall linear infinite; }
    .petal svg { display:block; }
    @keyframes petalFall {
      0%   { transform:translateY(-40px) rotate(0deg) translateX(0); opacity:0; }
      10%  { opacity:0.6; }
      90%  { opacity:0.35; }
      100% { transform:translateY(105vh) rotate(360deg) translateX(60px); opacity:0; }
    }
    .ink-line {
      position:absolute; height:1px;
      background:linear-gradient(90deg, transparent, var(--ink) 30%, var(--ink) 70%, transparent);
      opacity:0.07;
      animation:inkStroke 12s ease-in-out infinite;
    }
    @keyframes inkStroke {
      0%,100% { transform:scaleX(0.4); opacity:0.03; }
      50%      { transform:scaleX(1); opacity:0.08; }
    }

    /* ── Header ── */
    header {
      position: sticky; top:0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.1rem 5%;
      background: var(--paper-header);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      transition: background 0.5s ease, border-color 0.5s ease;
    }
    .logo-area{
  display:flex;
  align-items:center;
  gap:0.8rem;
  text-decoration:none;
}

/* Logo circle */
.logo-mark{
  position:relative;
  width:40px;
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.logo-mark svg{
  width:40px;
  height:40px;
}

/* ✨ Smooth, subtle ring draw */
.brush-ring{
  stroke-dasharray:120;
  stroke-dashoffset:120;
  animation:drawRing 0s ease-out forwards; /* slower + smooth */
  stroke:var(--sakura-deep);
  fill:none;
  transition:stroke 0.s;
}

@keyframes drawRing{
  to{stroke-dashoffset:0;}
}

/* ✨ Softer text appearance (no zoom jump) */
.logo-char{
  fill:var(--ink);
  opacity:0;
  animation:fadeChar  forwards;
}

@keyframes fadeChar{
  from{opacity:0; transform:translateY(4px);} /* subtle move instead of scale */
  to{opacity:1; transform:translateY(0);}
}

/* Text */
.logo-text{
  display:flex;
  flex-direction:column;
  line-height:1;
}

.logo-main{
  font-family:'Noto Serif JP',serif;
  font-weight:300;
  font-size:1.4rem;
  color:var(--ink);
  letter-spacing:0.02em;
  transition:color 0.3s ease;
}

.logo-sub{
  font-size:0.63rem;
  font-weight:300;
  color:var(--mist);
  letter-spacing:0.25em;
  text-transform:uppercase;
  margin-top:2px;
  transition:color 0.3s ease;
}                                                             

    .menu-container { position:relative; }
    .menu-button {
      background: transparent; border: 1px solid var(--border); color: var(--ink-soft);
      padding: 0.55rem 1.3rem; border-radius: 2px;
      font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 0.75rem; font-weight: 400;
      letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer;
      display: flex; align-items: center; gap: 0.6rem; transition: all 0.3s ease; position: relative; overflow: hidden;
    }
    .menu-button::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; background:var(--sakura-deep); transform:scaleX(0); transform-origin:left; transition:transform 0.4s cubic-bezier(.4,0,.2,1); }
    .menu-button:hover::after, .menu-container.active .menu-button::after { transform:scaleX(1); }
    .menu-button:hover { border-color:var(--sakura-deep); color:var(--ink); }
    .menu-button .chevron { font-size:0.7rem; transition:transform 0.4s; }
    .menu-container.active .menu-button .chevron { transform:rotate(180deg); }
    .dropdown-menu {
      position: absolute; top:calc(100% + 10px); right:0;
      background: var(--paper-header); backdrop-filter: blur(20px);
      border: 1px solid var(--border); border-radius: 2px; min-width: 210px;
      padding: 0.5rem 0; z-index: 200; opacity: 0; visibility: hidden;
      transform: translateY(-8px); transition: all 0.3s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 24px 48px var(--shadow);
    }
    .menu-container.active .dropdown-menu { opacity:1; visibility:visible; transform:translateY(0); }
    .dropdown-menu a { display: flex; align-items:center; gap:0.8rem; padding: 0.72rem 1.4rem; color: var(--ink-soft); text-decoration: none; font-size: 0.82rem; letter-spacing:0.06em; transition: all 0.2s; position: relative; }
    .dropdown-menu a::before { content:''; position:absolute; left:0; top:20%; bottom:20%; width:2px; background:var(--sakura-deep); transform:scaleY(0); transition:transform 0.25s; }
    .dropdown-menu a:hover { color:var(--ink); background:var(--sakura-pale); }
    .dropdown-menu a:hover::before { transform:scaleY(1); }
    .dropdown-menu a i { width:16px; color:var(--sakura-deep); font-size:0.75rem; }
    .dropdown-menu hr { margin:0.4rem 1rem; border:none; border-top:1px solid var(--border); }
    .dropdown-item-toggle { display: flex; align-items: center; justify-content: space-between; padding: 0.72rem 1.4rem; cursor: pointer; transition: background 0.2s; }
    .dropdown-item-toggle:hover { background: var(--sakura-pale); }
    .toggle-label { display: flex; align-items: center; gap: 0.8rem; font-size: 0.82rem; letter-spacing: 0.06em; color: var(--ink-soft); }
    .toggle-label i { width:16px; color:var(--sakura-deep); font-size:0.8rem; }
    .switch { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .switch input { opacity:0; width:0; height:0; }
    .switch-track { position: absolute; inset: 0; background: var(--toggle-track); border-radius: 20px; cursor: pointer; transition: background 0.4s; }
    .switch-track::after { content: ''; position: absolute; top: 3px; left: 3px; width: 14px; height: 14px; border-radius: 50%; background: var(--toggle-thumb); transition: transform 0.35s cubic-bezier(.4,0,.2,1), background 0.4s; box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
    .switch input:checked + .switch-track::after { transform: translateX(16px); }

    /* ── MAIN ── */
    main {
      position: relative; z-index: 1;
      flex: 1; padding: 3rem 5% 6rem;
    }

    .tasks-container { width: 100%; max-width: 900px; margin: 0 auto; }

    /* Section head */
    .tasks-head { margin-bottom: 2.5rem; display:flex; align-items:baseline; gap:1rem; }
    .tasks-kanji {
      font-family:'Noto Serif JP', serif; font-weight:200; font-size:3.5rem;
      color: rgba(26,26,46,0.07); line-height:1; letter-spacing:-0.02em; user-select:none;
      transition: color 0.5s ease;
    }
    [data-theme="dark"] .tasks-kanji { color: rgba(228,223,215,0.06); }
    .tasks-title-wrap { display:flex; flex-direction:column; }
    .tasks-title { font-family:'Noto Serif JP', serif; font-size:1.6rem; font-weight:200; color:var(--ink); letter-spacing:0.02em; line-height:1.3; transition: color 0.5s ease; }
    .tasks-title strong { font-weight:400; color:var(--sakura-deep); }
    .tasks-label { font-size:0.63rem; letter-spacing:0.3em; text-transform:uppercase; color:var(--mist); margin-top:4px; }

    /* Progress bar */
    .progress-bar-wrap {
      background: var(--paper-card); border: 1px solid var(--border);
      border-radius: 3px; padding: 1.2rem 1.8rem;
      margin-bottom: 2rem; display:flex; align-items:center; gap:1.5rem;
      backdrop-filter: blur(8px); transition: background 0.5s;
    }
    .progress-label { font-size:0.75rem; letter-spacing:0.15em; color:var(--mist); text-transform:uppercase; white-space:nowrap; }
    .progress-track {
      flex:1; height:6px; background: var(--border); border-radius:3px; overflow:hidden;
    }
    .progress-fill {
      height: 100%; background: linear-gradient(90deg, var(--sakura), var(--sakura-deep));
      border-radius: 3px; transition: width 0.6s cubic-bezier(.4,0,.2,1);
    }
    .progress-count { font-family:'Noto Serif JP', serif; font-size:1rem; color:var(--sakura-deep); white-space:nowrap; }

    /* Task card */
    .task-card {
      background: var(--paper-card); border: 1px solid var(--border);
      border-radius: 3px; padding: 2.2rem 2.5rem 2rem;
      position: relative; overflow: hidden; backdrop-filter: blur(8px);
      transition: transform 0.4s cubic-bezier(.4,0,.2,1), border-color 0.4s, box-shadow 0.4s, background 0.5s ease;
      margin-bottom: 2rem; animation: cardIn 0.45s cubic-bezier(.4,0,.2,1) forwards;
    }
    @keyframes cardIn {
      from { opacity:0; transform: translateY(18px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .task-card::before { content:''; position:absolute; top:0; left:0; width:36px; height:36px; border-top:2px solid transparent; border-left:2px solid transparent; transition:border-color 0.4s, width 0.4s, height 0.4s; }
    .task-card::after  { content:''; position:absolute; bottom:0; right:0; width:36px; height:36px; border-bottom:2px solid transparent; border-right:2px solid transparent; transition:border-color 0.4s, width 0.4s, height 0.4s; }
    .task-card:hover::before { border-color:var(--sakura-deep); width:52px; height:52px; }
    .task-card:hover::after  { border-color:var(--gold); width:52px; height:52px; }

    .task-type-badge {
      display: inline-flex; align-items:center; gap:0.4rem;
      font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--sakura-deep); margin-bottom: 1rem;
    }
    .task-type-badge i { font-size: 0.7rem; }

    .task-question {
      font-family: 'Noto Serif JP', serif; font-size: 1.35rem;
      font-weight: 300; color: var(--ink); margin-bottom: 1.5rem; line-height: 1.5;
    }

    /* Image grid for naming task */
    .image-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 1rem; margin-bottom: 1.5rem;
    }
    .image-option {
      background: var(--paper-warm); border: 2px solid var(--border);
      border-radius: 4px; padding: 0.8rem; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 0.6rem;
      transition: all 0.25s; user-select: none;
    }
    .image-option:hover { border-color: var(--sakura); transform: translateY(-2px); }
    .image-option.selected { border-color: var(--sakura-deep); background: var(--sakura-pale); }
    .image-option.correct  { border-color: var(--success); background: var(--success-pale); }
    .image-option.wrong    { border-color: var(--error);   background: var(--error-pale); }
    .image-option img {
      width: 80px; height: 80px; object-fit: contain;
      transition: transform 0.25s;
    }
    .image-option:hover img { transform: scale(1.08); }
    .image-option .img-label {
      font-size: 0.75rem; color: var(--ink-muted); letter-spacing: 0.05em;
    }

    /* Word matching */
    .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
    .match-col { display: flex; flex-direction: column; gap: 0.5rem; }
    .match-item {
      background: var(--paper-warm); border: 2px solid var(--border);
      border-radius: 3px; padding: 0.7rem 1rem;
      font-size: 0.9rem; color: var(--ink-soft); cursor: pointer;
      transition: all 0.2s; user-select: none; text-align: center;
    }
    .match-item:hover { border-color: var(--sakura); color: var(--ink); }
    .match-item.selected { border-color: var(--sakura-deep); background: var(--sakura-pale); color: var(--ink); }
    .match-item.matched   { border-color: var(--success); background: var(--success-pale); color: var(--success); pointer-events: none; }
    .match-item.error     { border-color: var(--error);   background: var(--error-pale);   color: var(--error); }

    /* Input tasks */
    .task-input {
      width: 100%; padding: 0.9rem 1.1rem;
      background: var(--paper-warm); border: 1.5px solid var(--border);
      border-radius: 3px; font-family: 'Zen Kaku Gothic New', sans-serif;
      font-size: 1rem; color: var(--ink); outline: none; resize: vertical; min-height: 80px;
      transition: border-color 0.25s, background 0.5s;
      margin-bottom: 1rem;
    }
    .task-input::placeholder { color: var(--mist); }
    .task-input:focus { border-color: var(--sakura-deep); }
    .task-input.correct { border-color: var(--success); background: var(--success-pale); }
    .task-input.wrong   { border-color: var(--error);   background: var(--error-pale); }

    /* Sentence completion blanks */
    .sentence-display {
      font-size: 1.2rem; color: var(--ink); line-height: 2; margin-bottom: 1.2rem;
      font-family: 'Noto Serif JP', serif; font-weight: 300;
    }
    .blank-input {
      display: inline-block; min-width: 120px; padding: 0.1rem 0.6rem;
      border: none; border-bottom: 2px solid var(--sakura-deep);
      background: transparent; font-family: 'Noto Serif JP', serif;
      font-size: 1.1rem; color: var(--sakura-deep); outline: none;
      transition: border-color 0.25s; text-align: center;
    }
    .blank-input:focus { border-color: var(--gold); }
    .blank-input.correct { border-color: var(--success); color: var(--success); }
    .blank-input.wrong   { border-color: var(--error);   color: var(--error); }

    /* Options (MCQ) */
    .options-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0.7rem; margin-bottom: 1.5rem;
    }
    .option-btn {
      background: var(--paper-warm); border: 2px solid var(--border);
      border-radius: 3px; padding: 0.8rem 1.1rem;
      font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 0.92rem;
      color: var(--ink-soft); cursor: pointer; text-align: left;
      transition: all 0.2s; display: flex; align-items:center; gap:0.5rem;
    }
    .option-btn:hover { border-color: var(--sakura); color: var(--ink); transform: translateX(2px); }
    .option-btn.selected  { border-color: var(--sakura-deep); color: var(--ink); background: var(--sakura-pale); }
    .option-btn.correct   { border-color: var(--success); background: var(--success-pale); color: var(--success); }
    .option-btn.wrong     { border-color: var(--error);   background: var(--error-pale);   color: var(--error); pointer-events:none; }
    .option-btn .opt-letter { font-family:'Noto Serif JP',serif; font-weight:400; color:var(--sakura-deep); min-width:1.2rem; }
    .option-btn.correct .opt-letter { color:var(--success); }
    .option-btn.wrong   .opt-letter { color:var(--error); }

    /* Speak task */
    .speak-counter {
      display: flex; align-items:center; gap:1rem; margin-bottom:1.2rem;
    }
    .speak-dot {
      width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border);
      background: transparent; transition: all 0.3s;
    }
    .speak-dot.done { background: var(--sakura-deep); border-color: var(--sakura-deep); }
    .speak-dot.active { background: var(--gold); border-color: var(--gold); animation: speakPulse 0.8s ease-in-out infinite; }
    @keyframes speakPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }

    .speak-btn {
      display: inline-flex; align-items:center; gap:0.6rem;
      background: var(--paper-warm); border: 1.5px solid var(--sakura-deep);
      border-radius: 3px; padding: 0.7rem 1.4rem;
      font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 0.88rem;
      color: var(--sakura-deep); cursor: pointer; transition: all 0.2s;
    }
    .speak-btn:hover { background: var(--sakura-pale); }
    .speak-btn.speaking { background: var(--sakura-pale); color: var(--sakura-deep); }

    /* Sentence for speak */
    .speak-sentence {
      font-family: 'Noto Serif JP', serif; font-size: 1.3rem; font-weight: 300;
      color: var(--ink); line-height: 1.6; margin-bottom: 1.5rem;
      padding: 1rem 1.5rem; background: var(--sakura-pale); border-left: 3px solid var(--sakura-deep);
      border-radius: 0 3px 3px 0;
    }

    /* Feedback */
    .feedback-msg {
      padding: 0.8rem 1.1rem; border-radius: 3px; font-size: 0.9rem;
      margin-bottom: 1rem; display: none; align-items: center; gap: 0.6rem;
    }
    .feedback-msg.success { background: var(--success-pale); color: var(--success); border: 1px solid var(--success); display:flex; }
    .feedback-msg.error   { background: var(--error-pale);   color: var(--error);   border: 1px solid var(--error);   display:flex; }

    /* Action row */
    .task-actions { display:flex; gap:0.8rem; align-items:center; margin-top:1.2rem; flex-wrap:wrap; }

    .check-btn {
      background: var(--sakura-deep); border: none; color: white;
      font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 0.92rem;
      letter-spacing: 0.1em; padding: 0.75rem 2rem; border-radius: 2px;
      cursor: pointer; display: inline-flex; align-items: center; gap: 0.6rem;
      transition: background 0.3s, transform 0.2s;
      box-shadow: 0 4px 12px rgba(196,104,126,0.3);
    }
    .check-btn:hover { background: #a05070; transform: scale(1.02); }
    .check-btn:active { transform: scale(0.98); }
    .check-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .next-btn {
      background: transparent; border: 1px solid var(--border); color: var(--ink-muted);
      padding: 0.65rem 1.4rem; border-radius: 2px;
      font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 0.78rem;
      letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s;
      display: none; align-items:center; gap:0.4rem;
    }
    .next-btn.visible { display: inline-flex; }
    .next-btn:hover { border-color: var(--sakura-deep); color: var(--ink); }

    /* Completed state */
    .all-done {
      text-align: center; padding: 3rem 2rem;
      background: var(--paper-card); border: 1px solid var(--border);
      border-radius: 3px; backdrop-filter: blur(8px);
    }
    .all-done-icon { font-size: 3rem; color: var(--gold); margin-bottom: 1rem; }
    .all-done h2 { font-family:'Noto Serif JP',serif; font-size:1.8rem; font-weight:300; color:var(--ink); margin-bottom:0.6rem; }
    .all-done p { color:var(--mist); margin-bottom:2rem; }

    .restart-btn {
      background: var(--sakura-deep); border: none; color: white;
      font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 0.92rem;
      padding: 0.8rem 2.5rem; border-radius: 2px; cursor: pointer;

      el.innerHTML = `<svg width="${size}" height="${size}" viewBox="0 0 20 20">

        image: IMAGES.hamburger,
        placeholder: 'e.g. The hamburger looks big and delicious.',

        isOpen: true,
      },
    ];

    /* ══════════════════════════════════════════════
       GAME ENGINE
    ══════════════════════════════════════════════ */

    let session = [];
    let current = 0;
    let score   = 0;

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length-1; i > 0; i--) {
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]] = [a[j],a[i]];
      }
      return a;
    }

    function pickSession() {
      // Pick 10 tasks: ensure variety across types
      const byType = {};
      TASK_POOL.forEach(t => { (byType[t.type] = byType[t.type]||[]).push(t); });
      const types = Object.keys(byType);
      let pool = [];
      // Round-robin through types
      let i = 0;
      while (pool.length < 10) {
        const type = types[i % types.length];
        const arr = byType[type];
        if (arr.length > 0) {
          const idx = Math.floor(Math.random()*arr.length);
          pool.push(arr.splice(idx,1)[0]);
        }
        i++;
        // safety: if all exhausted
        if (types.every(t => (byType[t]||[]).length === 0)) break;
      }
      // Shuffle final pool and pad if needed
      pool = shuffle(pool).slice(0,10);
      return pool;
    }

    function initSession() {
      session = pickSession();
      current = 0;
      score   = 0;
      renderDots();
      renderTask();
    }

    function renderDots() {
      const wrap = document.getElementById('taskDots');
      wrap.innerHTML = '';
      for (let i = 0; i < session.length; i++) {
        const d = document.createElement('div');
        d.className = 'task-dot' + (i < current ? ' done' : i === current ? ' current' : '');
        wrap.appendChild(d);
      }
    }

    function updateProgress() {
      const pct = (current / session.length) * 100;
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressCount').textContent = current + ' / ' + session.length;
    }

    function nextTask() {
      current++;
      renderDots();
      updateProgress();
      if (current >= session.length) {
        renderAllDone();
      } else {
        renderTask();
      }
    }

    function renderTask() {
      updateProgress();
      const task = session[current];
      const area = document.getElementById('taskArea');
      area.innerHTML = '';

      let html = '';
      switch (task.type) {
        case 'name-animal':
        case 'name-food':
          html = renderImageMCQ(task); break;
        case 'complete-sentence':
          html = renderCompleteSentence(task); break;
        case 'rewrite':
          html = renderRewrite(task); break;
        case 'speak-3':
          html = renderSpeak(task); break;
        case 'match-words':
          html = renderMatch(task); break;
        case 'general-mcq':
          html = task.isOpen ? renderOpenQuestion(task) : renderMCQ(task); break;
        case 'image-sentence':
          html = renderImageSentence(task); break;
      }

      area.innerHTML = html;
      bindTask(task);
    }

    /* ── Renderers ── */

    function badge(task) {
      return `<div class="task-type-badge"><i class="fas ${task.icon}"></i> ${task.badge} · Task ${current+1} of ${session.length}</div>`;
    }

    function renderImageMCQ(task) {
      const opts = shuffle(task.options).map(o =>
        `<button class="option-btn" data-val="${o}"><span class="opt-letter">→</span> ${o}</button>`
      ).join('');
      return `
        <div class="task-card">
          ${badge(task)}
          <p class="task-question">${task.question}</p>
          <div style="text-align:center;margin-bottom:1.5rem;">
            <img src="${task.image}" style="max-width:200px;max-height:200px;object-fit:contain;border-radius:8px;" alt="Task image"/>
          </div>
          <div class="options-grid">${opts}</div>
          <div class="feedback-msg" id="feedback"></div>
          <div class="task-actions">
            <button class="check-btn" id="checkBtn" disabled><i class="fas fa-check"></i> Check</button>
            <button class="next-btn" id="nextBtn"><i class="fas fa-arrow-right"></i> Next Task</button>
          </div>
        </div>`;
    }

    function renderMCQ(task) {
      const opts = shuffle(task.options).map(o =>
        `<button class="option-btn" data-val="${o}"><span class="opt-letter">→</span> ${o}</button>`
      ).join('');
      return `
        <div class="task-card">
          ${badge(task)}
          <p class="task-question">${task.question}</p>
          <div class="options-grid">${opts}</div>
          <div class="feedback-msg" id="feedback"></div>
          <div class="task-actions">
            <button class="check-btn" id="checkBtn" disabled><i class="fas fa-check"></i> Check</button>
            <button class="next-btn" id="nextBtn"><i class="fas fa-arrow-right"></i> Next Task</button>
          </div>
        </div>`;
    }

    function renderCompleteSentence(task) {
      const sentence = task.sentence.replace('___',
        `<input class="blank-input" id="blankInput" placeholder="___" autocomplete="off"/>`
      );
      return `
        <div class="task-card">
          ${badge(task)}
          <p class="task-question">${task.question}</p>
          <div class="sentence-display">${sentence}</div>
          <p class="task-hint"><i class="fas fa-lightbulb"></i> Hint: ${task.hint}</p>
          <div class="feedback-msg" id="feedback"></div>
          <div class="task-actions">
            <button class="check-btn" id="checkBtn"><i class="fas fa-check"></i> Check</button>
            <button class="next-btn" id="nextBtn"><i class="fas fa-arrow-right"></i> Next Task</button>
          </div>
        </div>`;
    }

    function renderRewrite(task) {
      return `
        <div class="task-card">
          ${badge(task)}
          <p class="task-question">${task.question}</p>
          <div class="speak-sentence">${task.original}</div>
          <p class="task-hint"><i class="fas fa-lightbulb"></i> Hint: ${task.hint}</p>
          <textarea class="task-input" id="rewriteInput" placeholder="Type your rewritten sentence here…"></textarea>
          <div class="feedback-msg" id="feedback"></div>
          <div class="task-actions">
            <button class="check-btn" id="checkBtn"><i class="fas fa-check"></i> Check</button>
            <button class="next-btn" id="nextBtn"><i class="fas fa-arrow-right"></i> Next Task</button>
          </div>
        </div>`;
    }

    function renderSpeak(task) {
      return `
        <div class="task-card">
          ${badge(task)}
          <p class="task-question">${task.question}</p>
          <div class="speak-sentence">${task.sentence}</div>
          <div class="speak-counter">
            <div class="speak-dot active" id="dot0"></div>
            <div class="speak-dot" id="dot1"></div>
            <div class="speak-dot" id="dot2"></div>
            <span style="font-size:0.8rem;color:var(--mist);margin-left:0.5rem;" id="speakStatus">0 / 3 times</span>
          </div>
          <button class="speak-btn" id="speakBtn"><i class="fas fa-volume-high"></i> I said it!</button>
          <div class="feedback-msg" id="feedback"></div>
          <div class="task-actions">
            <button class="next-btn" id="nextBtn"><i class="fas fa-arrow-right"></i> Next Task</button>
          </div>
        </div>`;
    }

    function renderMatch(task) {
      const meanings = shuffle(task.pairs.map(p => p.meaning));
      const words    = task.pairs.map(p => p.word);
      const wordItems = words.map(w =>
        `<div class="match-item" data-type="word" data-val="${w}">${w}</div>`
      ).join('');
      const meaningItems = meanings.map(m =>
        `<div class="match-item" data-type="meaning" data-val="${m}">${m}</div>`
      ).join('');
      return `
        <div class="task-card">
          ${badge(task)}
          <p class="task-question">${task.question}</p>
          <div class="match-grid">
            <div class="match-col" id="wordCol">${wordItems}</div>
            <div class="match-col" id="meaningCol">${meaningItems}</div>
          </div>
          <div class="feedback-msg" id="feedback"></div>
          <div class="task-actions">
            <button class="next-btn" id="nextBtn"><i class="fas fa-arrow-right"></i> Next Task</button>
          </div>
        </div>`;
    }

    function renderOpenQuestion(task) {
      return `
        <div class="task-card">
          ${badge(task)}
          <p class="task-question">${task.question}</p>
          <textarea class="task-input" id="openInput" placeholder="${task.placeholder || 'Write your answer here…'}"></textarea>
          <div class="feedback-msg" id="feedback"></div>
          <div class="task-actions">
            <button class="check-btn" id="checkBtn"><i class="fas fa-check"></i> Submit</button>
            <button class="next-btn" id="nextBtn"><i class="fas fa-arrow-right"></i> Next Task</button>
          </div>
        </div>`;
    }

    function renderImageSentence(task) {
      return `
        <div class="task-card">
          ${badge(task)}
          <p class="task-question">${task.question}</p>
          <div style="text-align:center;margin-bottom:1.2rem;">
            <img src="${task.image}" style="max-width:200px;max-height:200px;object-fit:contain;border-radius:8px;" alt="Task image"/>
          </div>
          <p class="task-hint" style="margin-bottom:0.8rem;"><i class="fas fa-lightbulb"></i> Hint: ${task.hint}</p>
          <textarea class="task-input" id="imgSentInput" placeholder="${task.placeholder}"></textarea>
          <div class="feedback-msg" id="feedback"></div>
          <div class="task-actions">
            <button class="check-btn" id="checkBtn"><i class="fas fa-check"></i> Submit</button>
            <button class="next-btn" id="nextBtn"><i class="fas fa-arrow-right"></i> Next Task</button>
          </div>
        </div>`;
    }

    function renderAllDone() {
      const area = document.getElementById('taskArea');
      area.innerHTML = `
        <div class="all-done">
          <div class="all-done-icon"><i class="fas fa-star"></i></div>
          <h2>All Done! 🎉</h2>
          <p>You completed all 10 daily tasks. Come back tomorrow for more!</p>
          <button class="restart-btn" id="restartBtn"><i class="fas fa-redo"></i> Start Again</button>
        </div>`;
      document.getElementById('restartBtn').addEventListener('click', initSession);
      document.getElementById('progressFill').style.width = '100%';
      document.getElementById('progressCount').textContent = '10 / 10';
      // All dots done
      document.querySelectorAll('.task-dot').forEach(d => { d.className = 'task-dot done'; });
    }

    /* ── Binders ── */

    function showFeedback(ok, msg) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = 'feedback-msg ' + (ok ? 'success' : 'error');
      fb.innerHTML = `<i class="fas ${ok ? 'fa-circle-check' : 'fa-circle-xmark'}"></i> ${msg}`;
    }

    function showNext() {
      const nb = document.getElementById('nextBtn');
      if (nb) nb.classList.add('visible');
    }

    function bindTask(task) {
      const nextBtn  = document.getElementById('nextBtn');
      const checkBtn = document.getElementById('checkBtn');

      if (nextBtn) nextBtn.addEventListener('click', nextTask);

      switch (task.type) {
        case 'name-animal':
        case 'name-food':
        case 'general-mcq': {
          if (task.isOpen) {
            // Open question
            if (checkBtn) checkBtn.addEventListener('click', () => {
              const val = (document.getElementById('openInput')||{}).value.trim();
              if (!val) return;
              showFeedback(true, 'Great answer! Well done 🌸');
              checkBtn.disabled = true;
              showNext();
            });
          } else {
            // MCQ
            document.querySelectorAll('.option-btn').forEach(btn => {
              btn.addEventListener('click', () => {
                document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                if (checkBtn) checkBtn.disabled = false;
              });
            });
            if (checkBtn) checkBtn.addEventListener('click', () => {
              const sel = document.querySelector('.option-btn.selected');
              if (!sel) return;
              const val = sel.dataset.val;
              const correct = val === task.correctAnswer;
              document.querySelectorAll('.option-btn').forEach(b => {
                if (b.dataset.val === task.correctAnswer) b.classList.add('correct');
                else if (b.classList.contains('selected')) b.classList.add('wrong');
                b.style.pointerEvents = 'none';
              });
              showFeedback(correct, correct ? 'Correct! 🎉 Great job!' : `Not quite. The answer is <strong>${task.correctAnswer}</strong>.`);
              checkBtn.disabled = true;
              showNext();
            });
          }
          break;
        }

        case 'complete-sentence': {
          const inp = document.getElementById('blankInput');
          if (checkBtn) checkBtn.addEventListener('click', () => {
            const val = inp ? inp.value.trim().toLowerCase() : '';
            const correct = val === task.blank.toLowerCase();
            if (inp) inp.classList.add(correct ? 'correct' : 'wrong');
            showFeedback(correct, correct ? 'Perfect! 🌸' : `The answer is <strong>${task.blank}</strong>.`);
            checkBtn.disabled = true;
            showNext();
          });
          break;
        }

        case 'rewrite': {
          if (checkBtn) checkBtn.addEventListener('click', () => {
            const val = (document.getElementById('rewriteInput')||{}).value.trim();
            if (!val) return;
            // Accept if close enough (simple check: contains key changed word)
            const correct = val.toLowerCase().includes(task.answer.toLowerCase().split(' ')[3] || '');
            showFeedback(true, `Your sentence: "${val}" — Example answer: <strong>${task.answer}</strong>`);
            checkBtn.disabled = true;
            showNext();
          });
          break;
        }

        case 'speak-3': {
          let count = 0;
          const speakBtn = document.getElementById('speakBtn');
          const statusEl = document.getElementById('speakStatus');
          if (speakBtn) speakBtn.addEventListener('click', () => {
            if (count >= 3) return;
            const dot = document.getElementById('dot' + count);
            if (dot) { dot.classList.remove('active'); dot.classList.add('done'); }
            count++;
            if (statusEl) statusEl.textContent = count + ' / 3 times';
            if (count < 3) {
              const next = document.getElementById('dot' + count);
              if (next) next.classList.add('active');
            }
            if (count === 3) {
              speakBtn.disabled = true;
              speakBtn.textContent = '✓ Done!';
              showFeedback(true, 'Excellent pronunciation practice! 🎤');
              showNext();
            }
          });
          break;
        }

        case 'match-words': {
          let selectedWord    = null;
          let selectedMeaning = null;
          let matched = 0;
          const correct = {};
          task.pairs.forEach(p => correct[p.word] = p.meaning);

          document.querySelectorAll('.match-item').forEach(item => {
            item.addEventListener('click', () => {
              if (item.classList.contains('matched')) return;

              if (item.dataset.type === 'word') {
                document.querySelectorAll('.match-item[data-type="word"]').forEach(i => i.classList.remove('selected'));
                item.classList.add('selected');
                selectedWord = item;
              } else {
                document.querySelectorAll('.match-item[data-type="meaning"]').forEach(i => i.classList.remove('selected'));
                item.classList.add('selected');
                selectedMeaning = item;
              }

              if (selectedWord && selectedMeaning) {
                const wv = selectedWord.dataset.val;
                const mv = selectedMeaning.dataset.val;
                const ok = correct[wv] === mv;

                if (ok) {
                  selectedWord.classList.add('matched'); selectedWord.classList.remove('selected');
                  selectedMeaning.classList.add('matched'); selectedMeaning.classList.remove('selected');
                  matched++;
                  if (matched === task.pairs.length) {
                    showFeedback(true, 'All matched correctly! 🎉');
                    showNext();
                  }
                } else {
                  selectedWord.classList.add('error'); selectedMeaning.classList.add('error');
                  setTimeout(() => {
                    selectedWord.classList.remove('error','selected');
                    selectedMeaning.classList.remove('error','selected');
                  }, 800);
                }
                selectedWord = null; selectedMeaning = null;
              }
            });
          });
          break;
        }

        case 'image-sentence': {
          if (checkBtn) checkBtn.addEventListener('click', () => {
            const val = (document.getElementById('imgSentInput')||{}).value.trim();
            if (val.length < 5) return;
            showFeedback(true, 'Nice sentence! Keep describing what you see 🌸');
            checkBtn.disabled = true;
            showNext();
          });
          break;
        }
      }
    }

    /* ── Start ── */
    initSession();

  })();
  
  </script>
